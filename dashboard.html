<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CreatorMatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .text-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .premium-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .premium-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.1), 0 10px 10px -5px rgba(59, 130, 246, 0.04);
            border-color: rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body class="text-gray-800 relative">

    <!-- Header (Glassmorphism) -->
    <header class="flex justify-between items-center py-5 px-8 bg-white/80 backdrop-blur-md shadow-sm border-b border-gray-100 sticky top-0 z-40">
        <div class="text-2xl font-extrabold text-gradient tracking-tight cursor-pointer hover:opacity-80 transition">
            <a href="index.html">CreatorMatch.</a>
        </div>
        <div class="flex items-center space-x-6">
            <a href="requests.html" class="text-gray-600 font-bold hover:text-purple-600 transition flex items-center gap-2">
                <span>🔔</span> Requests
            </a>
            <a href="edit-profile.html" class="text-gray-600 font-bold hover:text-blue-600 transition flex items-center gap-2">
                <span>⚙️</span> Settings
            </a>
            <button id="logout-btn" class="bg-red-50 text-red-600 px-5 py-2.5 rounded-xl font-bold hover:bg-red-100 hover:shadow-md transition">Logout</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto mt-12 px-4 mb-20">
        
        <!-- Welcome Section & Filters -->
        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100 mb-10 flex flex-col md:flex-row justify-between items-center md:items-end gap-6">
            <div>
                <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight mb-2" id="dash-title">Welcome Back! 👋</h1>
                <p class="text-gray-500 font-semibold text-lg" id="dash-subtitle">Loading your personalized view...</p>
            </div>
            
            <div id="search-filter-container" class="hidden flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                <div class="relative w-full sm:w-72">
                    <span class="absolute left-4 top-3.5 text-gray-400">🔍</span>
                    <input type="text" id="search-bar" placeholder="Search..." class="w-full pl-10 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:bg-white transition text-sm font-bold shadow-inner">
                </div>
                
                <select id="filter-dropdown" class="w-full sm:w-56 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:bg-white transition text-sm font-bold cursor-pointer shadow-inner">
                    <option value="All">Loading filters...</option>
                </select>
            </div>
        </div>

        <!-- Cards Grid -->
        <div id="data-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-20">
                <div class="inline-block w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                <p class="text-gray-500 font-bold">Fetching data from server...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyACcJOwTJrBKKbE56gLtsE8U2JD2VxBIiQ", authDomain: "creatormatch-7c723.firebaseapp.com", projectId: "creatormatch-7c723", storageBucket: "creatormatch-7c723.firebasestorage.app", messagingSenderId: "62514210796", appId: "1:62514210796:web:478775e3e03726693382c9" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        let allData = []; let currentRole = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    currentRole = userDoc.data().role;
                    document.getElementById("search-filter-container").classList.remove("hidden");
                    if (currentRole === 'business') loadForBusiness();
                    else loadForCreator();
                }
            } else {
                window.location.href = "index.html";
            }
        });

        // BUSINESS VIEW
        async function loadForBusiness() {
            document.getElementById("dash-title").innerText = "Discover Creators ✨";
            document.getElementById("dash-subtitle").innerText = "Find the perfect voice for your brand.";
            document.getElementById("search-bar").placeholder = "Search by name...";
            document.getElementById("filter-dropdown").innerHTML = `
                <option value="All">All Categories</option>
                <option value="Tech & Gadgets">Tech & Gadgets</option>
                <option value="Fashion & Lifestyle">Fashion & Lifestyle</option>
                <option value="Gaming">Gaming</option>
                <option value="Education">Education</option>
                <option value="Food & Travel">Food & Travel</option>
            `;

            const querySnapshot = await getDocs(collection(db, "creators"));
            allData = []; querySnapshot.forEach(doc => allData.push({ id: doc.id, ...doc.data() }));
            renderCreators(allData);
        }

        function renderCreators(creatorsArray) {
            const grid = document.getElementById("data-grid"); grid.innerHTML = "";
            if(creatorsArray.length === 0) { grid.innerHTML = "<p class='text-gray-500 font-bold col-span-full text-center'>No creators found matching your search.</p>"; return; }
            
            creatorsArray.forEach(creator => {
                grid.innerHTML += `
                    <div class="premium-card flex flex-col overflow-hidden group">
                        <div class="h-24 bg-gradient-to-r from-purple-500 to-blue-500 relative">
                            <div class="absolute -bottom-8 left-6 w-16 h-16 bg-white rounded-xl p-1 shadow-lg transform group-hover:scale-110 transition-transform duration-300 rotate-[-5deg]">
                                <img src="${creator.imageUrl || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover rounded-lg">
                            </div>
                        </div>
                        <div class="pt-12 pb-6 px-6 flex-1 flex flex-col">
                            <h3 class="text-xl font-extrabold text-gray-900 mb-1">${creator.name}</h3>
                            <p class="text-xs font-bold text-purple-600 tracking-wider uppercase mb-3">${creator.category}</p>
                            <p class="text-sm font-semibold text-gray-500 mb-6 flex items-center gap-1"><span>👥</span> ${(creator.followers || 0).toLocaleString()} Followers</p>
                            
                            <a href="profile.html?id=${creator.id}" class="mt-auto block w-full text-center py-3 bg-gray-50 text-gray-900 font-bold rounded-xl hover:bg-gray-900 hover:text-white transition-colors border border-gray-200 hover:border-gray-900">
                                View Profile
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        // CREATOR VIEW
        async function loadForCreator() {
            document.getElementById("dash-title").innerText = "Brand Opportunities 🎯";
            document.getElementById("dash-subtitle").innerText = "Connect with top brands looking for creators.";
            document.getElementById("search-bar").placeholder = "Search brand name...";

            const querySnapshot = await getDocs(collection(db, "businesses"));
            allData = []; let uniqueIndustries = new Set();
            querySnapshot.forEach(doc => { let data = doc.data(); allData.push({ id: doc.id, ...data }); if(data.industry) uniqueIndustries.add(data.industry); });

            let dropdownHTML = `<option value="All">All Industries</option>`;
            uniqueIndustries.forEach(industry => dropdownHTML += `<option value="${industry}">${industry}</option>`);
            document.getElementById("filter-dropdown").innerHTML = dropdownHTML;
            renderBusinesses(allData);
        }

        function renderBusinesses(businessArray) {
            const grid = document.getElementById("data-grid"); grid.innerHTML = "";
            if (businessArray.length === 0) { grid.innerHTML = "<p class='text-gray-500 font-bold col-span-full text-center'>No brands found matching your search.</p>"; return; }

            businessArray.forEach((business) => {
                grid.innerHTML += `
                    <div class="premium-card p-6 flex flex-col text-center items-center group">
                        <div class="w-20 h-20 bg-gradient-to-br from-gray-800 to-black text-white rounded-2xl flex items-center justify-center text-3xl font-extrabold mb-5 shadow-lg transform group-hover:-rotate-6 transition-transform duration-300 overflow-hidden border-4 border-white">
                            ${business.logoUrl ? `<img src="${business.logoUrl}" class="w-full h-full object-cover">` : business.companyName.charAt(0)}
                        </div>
                        <h3 class="text-xl font-extrabold text-gray-900 mb-1">${business.companyName}</h3>
                        <p class="text-xs font-bold text-blue-600 tracking-wider uppercase mb-6 bg-blue-50 px-3 py-1 rounded-full">${business.industry}</p>
                        <a href="${business.website || '#'}" target="_blank" class="mt-auto w-full py-3 bg-gray-50 text-gray-900 font-bold rounded-xl hover:bg-gray-200 transition-colors border border-gray-200">
                            Visit Website ↗
                        </a>
                    </div>
                `;
            });
        }

        // SEARCH LOGIC
        function applySearchAndFilter() {
            const searchTerm = document.getElementById("search-bar").value.toLowerCase(); const filterValue = document.getElementById("filter-dropdown").value;
            if (currentRole === 'business') {
                renderCreators(allData.filter(item => (item.name.toLowerCase().includes(searchTerm) || item.category.toLowerCase().includes(searchTerm)) && (filterValue === "All" || item.category === filterValue)));
            } else {
                renderBusinesses(allData.filter(item => (item.companyName.toLowerCase().includes(searchTerm)) && (filterValue === "All" || item.industry === filterValue)));
            }
        }
        document.getElementById("search-bar").addEventListener("input", applySearchAndFilter);
        document.getElementById("filter-dropdown").addEventListener("change", applySearchAndFilter);

        // LOGOUT
        document.getElementById("logout-btn").addEventListener("click", () => signOut(auth).then(() => window.location.href = "index.html"));
    </script>
</body>
</html>
