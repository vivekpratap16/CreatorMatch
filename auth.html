<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - CreatorMatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-color: #f8fafc; }
        
        .blob {
            position: absolute; filter: blur(80px); z-index: -1; opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }
        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-50px) scale(1.1); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        .text-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative p-4">

    <!-- Animated Background Blobs -->
    <div class="blob bg-blue-400 w-96 h-96 rounded-full top-[-10%] left-[-10%]"></div>
    <div class="blob bg-purple-400 w-96 h-96 rounded-full bottom-[-10%] right-[-10%]" style="animation-delay: 3s;"></div>

    <div class="glass-card max-w-md w-full rounded-[2rem] p-10 relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-gradient mb-2 tracking-tight">CreatorMatch.</h1>
            <p class="text-gray-500 font-semibold text-sm">Join the network of top brands & creators</p>
        </div>

        <div id="auth-form" class="space-y-6">
            <div>
                <label class="block text-sm font-extrabold text-gray-700 mb-2 uppercase tracking-wide">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:bg-white transition text-sm font-bold shadow-inner">
            </div>
            <div>
                <label class="block text-sm font-extrabold text-gray-700 mb-2 uppercase tracking-wide">Password</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:bg-white transition text-sm font-bold shadow-inner">
            </div>

            <!-- Role Selection (For Signup) -->
            <div id="role-selection" class="mb-4">
                <label class="block text-sm font-extrabold text-gray-700 mb-3 uppercase tracking-wide">I am a...</label>
                <div class="flex gap-4">
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="role" value="creator" class="peer hidden" checked>
                        <div class="text-center py-3 bg-white border-2 border-gray-200 rounded-xl peer-checked:border-purple-500 peer-checked:bg-purple-50 peer-checked:text-purple-700 font-bold transition">
                            ✨ Creator
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="role" value="business" class="peer hidden">
                        <div class="text-center py-3 bg-white border-2 border-gray-200 rounded-xl peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 font-bold transition">
                            🏢 Brand
                        </div>
                    </label>
                </div>
            </div>

            <button id="auth-btn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-extrabold rounded-2xl hover:shadow-lg hover:shadow-purple-500/30 transform hover:-translate-y-0.5 transition-all duration-300 text-lg">
                Sign Up
            </button>

            <div class="text-center mt-6">
                <button id="toggle-auth" class="text-gray-500 font-bold hover:text-gray-900 transition underline underline-offset-4">
                    Already have an account? Login
                </button>
            </div>
            <div class="text-center mt-4">
                <a href="index.html" class="text-xs font-bold text-gray-400 hover:text-gray-600 transition">← Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js"; 

        const firebaseConfig = { apiKey: "AIzaSyACcJOwTJrBKKbE56gLtsE8U2JD2VxBIiQ", authDomain: "creatormatch-7c723.firebaseapp.com", projectId: "creatormatch-7c723", storageBucket: "creatormatch-7c723.firebasestorage.app", messagingSenderId: "62514210796", appId: "1:62514210796:web:478775e3e03726693382c9" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        let isSignup = true;
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const authBtn = document.getElementById("auth-btn");
        const toggleBtn = document.getElementById("toggle-auth");
        const roleSelection = document.getElementById("role-selection");

        toggleBtn.addEventListener("click", () => {
            isSignup = !isSignup;
            if(isSignup) {
                authBtn.innerText = "Sign Up";
                toggleBtn.innerText = "Already have an account? Login";
                roleSelection.style.display = "block";
            } else {
                authBtn.innerText = "Login";
                toggleBtn.innerText = "New here? Create an account";
                roleSelection.style.display = "none";
            }
        });

        authBtn.addEventListener("click", async () => {
            const email = emailInput.value; const password = passwordInput.value;
            if(!email || !password) return alert("Please enter email and password!");
            
            authBtn.innerText = "Processing..."; authBtn.disabled = true;

            try {
                if(isSignup) {
                    const selectedRole = document.querySelector('input[name="role"]:checked').value;
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    await setDoc(doc(db, "users", user.uid), { email: user.email, role: selectedRole, uid: user.uid });
                    
                    if(selectedRole === 'creator') window.location.href = "setup.html";
                    else {
                        await setDoc(doc(db, "businesses", user.uid), { companyName: "My Brand", industry: "General", uid: user.uid });
                        window.location.href = "dashboard.html";
                    }
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                    window.location.href = "dashboard.html";
                }
            } catch (error) {
                alert("Error: " + error.message);
                authBtn.innerText = isSignup ? "Sign Up" : "Login";
                authBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
