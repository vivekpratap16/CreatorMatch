<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorMatch - Find Your Perfect Collab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="auth-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-md w-full p-8 text-center shadow-2xl transform scale-100 transition-all">
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Welcome to CreatorMatch</h2>
            <p class="text-gray-500 mb-8 font-semibold">Join the best platform to connect Brands and Creators.</p>
            
            <a href="auth.html" class="block w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition shadow-lg mb-4 text-lg">
                Login / Sign Up
            </a>
            <button onclick="closeModal()" class="text-gray-500 font-bold hover:text-gray-800 transition">
                Skip for now, explore as Guest
            </button>
        </div>
    </div>

    <header class="flex justify-between items-center py-4 px-8 bg-white shadow-sm border-b border-gray-100">
        <div class="text-2xl font-extrabold text-blue-600 tracking-tight">CreatorMatch</div>
        <div id="nav-links">
            </div>
    </header>

    <main class="max-w-6xl mx-auto mt-10 px-4 mb-20 text-center">
        <h1 class="text-5xl font-extrabold text-gray-900 mb-4 tracking-tight">Discover Top Talent & Brands</h1>
        <p class="text-gray-500 text-xl font-semibold mb-10">Explore the platform before signing up.</p>
        
        <h2 class="text-2xl font-bold text-left mb-6">Featured Creators</h2>
        <div id="guest-creators" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 text-left mb-16">
            <p class="text-gray-400">Loading creators...</p>
        </div>

        <h2 class="text-2xl font-bold text-left mb-6">Brands on Platform</h2>
        <div id="guest-brands" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 text-left">
            <p class="text-gray-400">Loading brands...</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACcJOwTJrBKKbE56gLtsE8U2JD2VxBIiQ",
            authDomain: "creatormatch-7c723.firebaseapp.com",
            projectId: "creatormatch-7c723",
            storageBucket: "creatormatch-7c723.firebasestorage.app",
            messagingSenderId: "62514210796",
            appId: "1:62514210796:web:478775e3e03726693382c9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Modal Logic
        const modal = document.getElementById('auth-modal');
        const navLinks = document.getElementById('nav-links');

        window.closeModal = function() {
            modal.classList.add('hidden');
            sessionStorage.setItem('guestSkipped', 'true'); // Yaad rakho ki skip kiya tha
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Agar logged in hai, toh Dashboard ka button dikhao
                navLinks.innerHTML = `<a href="dashboard.html" class="bg-gray-900 text-white px-6 py-2 rounded-lg font-bold hover:bg-gray-800 transition">Go to Dashboard</a>`;
                modal.classList.add('hidden'); // Modal mat dikhao
            } else {
                // Logged out hai
                navLinks.innerHTML = `<a href="auth.html" class="text-blue-600 font-bold hover:underline">Login / Join</a>`;
                // Agar pehle skip nahi kiya hai, toh Modal dikhao
                if (!sessionStorage.getItem('guestSkipped')) {
                    modal.classList.remove('hidden');
                }
            }
        });

        // Guest Data Fetching
        async function loadGuestData() {
            // Load Creators
            const cSnap = await getDocs(collection(db, "creators"));
            const cContainer = document.getElementById("guest-creators");
            cContainer.innerHTML = "";
            cSnap.forEach(doc => {
                const data = doc.data();
                cContainer.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                        <img src="${data.imageUrl || 'https://via.placeholder.com/50'}" class="w-16 h-16 rounded-full object-cover">
                        <div><h3 class="font-bold text-lg">${data.name}</h3><p class="text-sm text-gray-500">${data.category}</p></div>
                    </div>`;
            });

            // Load Businesses
            const bSnap = await getDocs(collection(db, "businesses"));
            const bContainer = document.getElementById("guest-brands");
            bContainer.innerHTML = "";
            bSnap.forEach(doc => {
                const data = doc.data();
                bContainer.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center font-bold text-xl">${data.companyName.charAt(0)}</div>
                        <div><h3 class="font-bold text-lg">${data.companyName}</h3><p class="text-sm text-gray-500">${data.industry}</p></div>
                    </div>`;
            });
        }
        loadGuestData();
    </script>
</body>
</html>
