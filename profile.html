<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Profile - CreatorMatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .watermark-bg {
            position: fixed;
            top: 0; left: 0; width: 200vw; height: 100vh;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 150px, rgba(59, 130, 246, 0.03) 150px, rgba(59, 130, 246, 0.03) 300px);
            z-index: -1;
            animation: slideBg 90s linear infinite;
        }
        @keyframes slideBg {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50vw); }
        }
    </style>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          // Aapki Public Key yahan hai
          emailjs.init("w9UsyTWGSZHaT3AzZ");
       })();
    </script>
</head>
<body class="bg-gray-50 text-gray-800 relative">

    <div class="watermark-bg"></div>

    <header class="flex justify-between items-center py-4 px-8 bg-white shadow-sm border-b border-gray-100 relative z-10">
        <div class="text-2xl font-extrabold text-blue-600 tracking-tight">
            <a href="index.html">CreatorMatch</a>
        </div>
        <div>
            <a href="dashboard.html" class="text-gray-600 font-semibold hover:text-blue-600 transition">← Back to Dashboard</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto mt-10 px-4 mb-20 relative z-10" id="profile-container">
        <div class="text-center py-20">
            <p class="text-gray-500 text-lg font-semibold animate-pulse">Loading Profile Details...</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js"; 

        const firebaseConfig = {
            apiKey: "AIzaSyACcJOwTJrBKKbE56gLtsE8U2JD2VxBIiQ",
            authDomain: "creatormatch-7c723.firebaseapp.com",
            projectId: "creatormatch-7c723",
            storageBucket: "creatormatch-7c723.firebasestorage.app",
            messagingSenderId: "62514210796",
            appId: "1:62514210796:web:478775e3e03726693382c9",
            measurementId: "G-0VN4N73DP1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) { currentUser = user; } 
            else { window.location.href = "auth.html"; }
        });

        const urlParams = new URLSearchParams(window.location.search);
        const creatorId = urlParams.get('id');

        function getYouTubeEmbedUrl(url) {
            if (!url) return null;
            let videoId = "";
            if (url.includes("v=")) {
                videoId = url.split("v=")[1].substring(0, 11);
            } else if (url.includes("youtu.be/")) {
                videoId = url.split("youtu.be/")[1].substring(0, 11);
            }
            return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
        }

        async function loadProfile() {
            const container = document.getElementById("profile-container");

            if (!creatorId) return;

            try {
                const docRef = doc(db, "creators", creatorId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    let socialLinksHtml = "";
                    if (data.instagram) {
                        socialLinksHtml += `<a href="${data.instagram}" target="_blank" class="px-4 py-2 bg-pink-50 text-pink-600 rounded-lg font-bold hover:bg-pink-100 transition shadow-sm">📸 Instagram</a>`;
                    }
                    if (data.linkedin) {
                        socialLinksHtml += `<a href="${data.linkedin}" target="_blank" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-lg font-bold hover:bg-blue-100 transition shadow-sm">🔗 LinkedIn</a>`;
                    }

                    let videoHtml = "";
                    const embedUrl = getYouTubeEmbedUrl(data.video);
                    if (embedUrl) {
                        videoHtml = `
                            <div class="mt-10">
                                <h2 class="text-xl font-bold text-gray-900 mb-4">Featured Showcase</h2>
                                <div class="relative w-full overflow-hidden rounded-2xl shadow-lg border border-gray-100" style="padding-top: 56.25%;">
                                    <iframe class="absolute top-0 left-0 w-full h-full" src="${embedUrl}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                </div>
                            </div>
                        `;
                    }

                    container.innerHTML = `
                        <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                            <div class="h-48 bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 animate-gradient"></div>
                            
                            <div class="px-8 pb-10">
                                <div class="flex flex-col sm:flex-row items-start sm:items-end gap-6 -mt-16 relative z-10">
                                    <div class="w-32 h-32 bg-white rounded-full border-4 border-white shadow-lg overflow-hidden flex-shrink-0">
                                        <img src="${data.imageUrl || 'https://via.placeholder.com/150'}" alt="${data.name}" class="w-full h-full object-cover">
                                    </div>
                                    
                                    <div class="flex-1 w-full flex flex-col sm:flex-row sm:justify-between sm:items-end gap-4 pb-2">
                                        <div>
                                            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">${data.name}</h1>
                                            <p class="text-sm font-bold text-purple-600 mt-1 uppercase tracking-widest">${data.category}</p>
                                        </div>
                                        <button id="send-request-btn" class="bg-gray-900 text-white px-8 py-3 rounded-xl font-bold hover:bg-gray-800 transition shadow-lg transform hover:-translate-y-1 whitespace-nowrap">
                                            Send Collab Request
                                        </button>
                                    </div>
                                </div>

                                <div class="flex gap-3 mt-6">
                                    ${socialLinksHtml}
                                </div>

                                <div class="mt-8 pt-8 border-t border-gray-100">
                                    <h2 class="text-xl font-bold text-gray-900 mb-4">About the Creator</h2>
                                    <p class="text-gray-600 leading-relaxed text-lg">
                                        ${data.bio || "This creator hasn't added a bio yet, but their content speaks for itself!"}
                                    </p>
                                </div>

                                ${videoHtml}
                                
                            </div>
                        </div>
                    `;

                    const requestBtn = document.getElementById("send-request-btn");
                    requestBtn.addEventListener("click", async () => {
                        if(!currentUser) return;
                        requestBtn.innerText = "Sending...";
                        requestBtn.disabled = true;
                        
                        try {
                            // 1. Database mein Save karo
                            await addDoc(collection(db, "requests"), {
                                businessId: currentUser.uid,
                                creatorId: creatorId,
                                status: "Pending",
                                timestamp: new Date()
                            });

                            // 2. NAYA: EmailJS se Asli Mail Bhejo!
                            // Aapki Service ID aur Template ID yahan hain
                            await emailjs.send("service_c2zs788", "template_xyz987", {
                                to_name: data.name, // Creator ka naam
                                business_name: currentUser.email // Jisne request bheji uska email ya naam
                            });

                            requestBtn.innerText = "Request Sent! ✓";
                            requestBtn.classList.replace("bg-gray-900", "bg-green-600");
                            requestBtn.classList.replace("hover:bg-gray-800", "hover:bg-green-700");
                            
                            alert("Request sent successfully! An email notification has been dispatched.");

                        } catch (error) {
                            console.error("Error:", error);
                            alert("Error processing request: " + error.message);
                            requestBtn.innerText = "Send Collab Request";
                            requestBtn.disabled = false;
                        }
                    });

                }
            } catch (error) {
                console.error(error);
            }
        }

        loadProfile();
    </script>
</body>
</html>
