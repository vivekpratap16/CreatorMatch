<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Requests - CreatorMatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .text-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .premium-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .premium-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body class="text-gray-800 relative min-h-screen">

    <!-- Header (Glassmorphism) -->
    <header class="flex justify-between items-center py-5 px-8 bg-white/80 backdrop-blur-md shadow-sm border-b border-gray-100 sticky top-0 z-40">
        <div class="text-2xl font-extrabold text-gradient tracking-tight cursor-pointer hover:opacity-80 transition">
            <a href="index.html">CreatorMatch.</a>
        </div>
        <div class="flex items-center space-x-6">
            <a href="dashboard.html" class="text-gray-600 font-bold hover:text-blue-600 transition flex items-center gap-2">
                <span>←</span> Back to Dashboard
            </a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto mt-12 px-4 mb-20">
        <div class="mb-10 text-center md:text-left">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight mb-2" id="page-title">Collaboration Requests</h1>
            <p class="text-gray-500 font-semibold text-lg" id="page-subtitle">Loading your request history...</p>
        </div>

        <!-- Requests List -->
        <div id="requests-list" class="space-y-6">
            <div class="text-center py-20">
                <div class="inline-block w-10 h-10 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin mb-4"></div>
                <p class="text-gray-500 font-bold">Fetching your requests...</p>
            </div>
        </div>
    </main>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js"; 

        const firebaseConfig = { apiKey: "AIzaSyACcJOwTJrBKKbE56gLtsE8U2JD2VxBIiQ", authDomain: "creatormatch-7c723.firebaseapp.com", projectId: "creatormatch-7c723", storageBucket: "creatormatch-7c723.firebasestorage.app", messagingSenderId: "62514210796", appId: "1:62514210796:web:478775e3e03726693382c9" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) loadMyRequests(user.uid, userDoc.data().role);
            } else window.location.href = "auth.html";
        });

        async function loadMyRequests(userId, role) {
            const listContainer = document.getElementById("requests-list");
            const pageTitle = document.getElementById("page-title");
            const pageSubtitle = document.getElementById("page-subtitle");

            try {
                let q;
                if (role === 'business') {
                    pageTitle.innerText = "Sent Requests 🚀";
                    pageSubtitle.innerText = "Creators you've pitched for collaborations.";
                    q = query(collection(db, "requests"), where("businessId", "==", userId));
                } else {
                    pageTitle.innerText = "Brand Inquiries 📩";
                    pageSubtitle.innerText = "Brands that want to work with you.";
                    q = query(collection(db, "requests"), where("creatorId", "==", userId));
                }

                const querySnapshot = await getDocs(q); listContainer.innerHTML = ""; 

                if (querySnapshot.empty) {
                    listContainer.innerHTML = `
                        <div class="premium-card p-12 text-center">
                            <div class="text-5xl mb-4">📭</div>
                            <h3 class="text-2xl font-extrabold text-gray-900 mb-2">No requests found!</h3>
                            <p class="text-gray-500 font-semibold mb-6">Looks like it's a bit quiet here. Explore the dashboard to make moves.</p>
                            <a href="dashboard.html" class="bg-gray-900 text-white px-8 py-3 rounded-xl font-bold hover:bg-gray-800 transition shadow-lg">Go to Dashboard</a>
                        </div>`;
                    return;
                }

                querySnapshot.forEach(async (requestDoc) => {
                    const requestData = requestDoc.data(); const requestId = requestDoc.id;
                    
                    if (role === 'business') {
                        const creatorSnap = await getDoc(doc(db, "creators", requestData.creatorId));
                        if (creatorSnap.exists()) {
                            const creator = creatorSnap.data();
                            
                            let statusBadge = `<span class="bg-yellow-100 text-yellow-700 ring-1 ring-yellow-600/20 px-4 py-1.5 rounded-full text-xs font-extrabold uppercase tracking-widest shadow-sm">⏳ ${requestData.status}</span>`;
                            if(requestData.status === "Accepted") statusBadge = `<span class="bg-green-100 text-green-700 ring-1 ring-green-600/20 px-4 py-1.5 rounded-full text-xs font-extrabold uppercase tracking-widest shadow-sm">✅ ${requestData.status}</span>`;
                            if(requestData.status === "Rejected") statusBadge = `<span class="bg-red-100 text-red-700 ring-1 ring-red-600/20 px-4 py-1.5 rounded-full text-xs font-extrabold uppercase tracking-widest shadow-sm">❌ ${requestData.status}</span>`;

                            listContainer.innerHTML += `
                                <div class="premium-card p-6 flex flex-col sm:flex-row items-center justify-between gap-6 group">
                                    <div class="flex items-center gap-5 w-full sm:w-auto">
                                        <div class="w-16 h-16 rounded-full p-1 bg-gradient-to-tr from-purple-400 to-blue-400 shrink-0">
                                            <img src="${creator.imageUrl}" class="w-full h-full rounded-full object-cover border-2 border-white">
                                        </div>
                                        <div>
                                            <h3 class="text-xl font-extrabold text-gray-900">${creator.name}</h3>
                                            <p class="text-sm font-bold text-gray-500 tracking-wide">PITCHED CREATOR</p>
                                        </div>
                                    </div>
                                    <div class="flex flex-col sm:items-end gap-3 w-full sm:w-auto">
                                        ${statusBadge}
                                        <a href="profile.html?id=${requestData.creatorId}" class="text-sm font-bold text-blue-600 hover:text-blue-800 transition underline underline-offset-4 mt-1">View Profile</a>
                                    </div>
                                </div>
                            `;
                        }
                    } else {
                        let statusBadge = `<span class="bg-yellow-100 text-yellow-700 ring-1 ring-yellow-600/20 px-4 py-1.5 rounded-full text-xs font-extrabold uppercase tracking-widest shadow-sm">⏳ ${requestData.status}</span>`;
                        if(requestData.status === "Accepted") statusBadge = `<span class="bg-green-100 text-green-700 ring-1 ring-green-600/20 px-4 py-1.5 rounded-full text-xs font-extrabold uppercase tracking-widest shadow-sm">✅ ${requestData.status}</span>`;
                        if(requestData.status === "Rejected") statusBadge = `<span class="bg-red-100 text-red-700 ring-1 ring-red-600/20 px-4 py-1.5 rounded-full text-xs font-extrabold uppercase tracking-widest shadow-sm">❌ ${requestData.status}</span>`;

                        let buttonsHTML = "";
                        if (requestData.status === "Pending") {
                            buttonsHTML = `
                                <div class="flex gap-3 mt-4">
                                    <button onclick="updateStatus('${requestId}', 'Accepted')" class="bg-green-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-green-700 hover:shadow-lg hover:-translate-y-0.5 transition-all">Accept Collab</button>
                                    <button onclick="updateStatus('${requestId}', 'Rejected')" class="bg-red-50 text-red-600 px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-red-100 transition-colors">Pass</button>
                                </div>
                            `;
                        }

                        listContainer.innerHTML += `
                            <div class="premium-card p-6 flex flex-col sm:flex-row sm:items-center justify-between gap-6">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-xl">🤝</span>
                                        <h3 class="text-xl font-extrabold text-gray-900">New Collaboration Request</h3>
                                    </div>
                                    <p class="text-sm font-bold text-gray-500">A registered brand wants to connect with you!</p>
                                    ${buttonsHTML}
                                </div>
                                <div class="text-left sm:text-right">
                                    ${statusBadge}
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (error) { listContainer.innerHTML = "<p class='text-red-500 font-bold'>Error loading your requests.</p>"; }
        }

        window.updateStatus = async function(requestId, newStatus) {
            try {
                await updateDoc(doc(db, "requests", requestId), { status: newStatus });
                window.location.reload(); 
            } catch (error) { alert("Error updating status: " + error.message); }
        }
    </script>
</body>
</html>
