<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Requests - CreatorMatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="flex justify-between items-center py-4 px-8 bg-white shadow-sm border-b border-gray-100">
        <div class="text-2xl font-extrabold text-blue-600 tracking-tight">
            <a href="index.html">CreatorMatch</a>
        </div>
        <div class="flex items-center space-x-6">
            <a href="dashboard.html" class="text-gray-600 font-semibold hover:text-blue-600 transition">← Back to Dashboard</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto mt-10 px-4 mb-20">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2" id="page-title">My Requests</h1>
        <p class="text-gray-500 mb-8 font-semibold" id="page-subtitle">Loading your requests...</p>

        <div id="requests-list" class="space-y-4">
            <p class="text-gray-500 text-center py-10 font-semibold animate-pulse">Fetching data...</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        // NAYA: 'updateDoc' import kiya taaki document ka status badal sakein
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js"; 

        const firebaseConfig = {
            apiKey: "AIzaSyACcJOwTJrBKKbE56gLtsE8U2JD2VxBIiQ",
            authDomain: "creatormatch-7c723.firebaseapp.com",
            projectId: "creatormatch-7c723",
            storageBucket: "creatormatch-7c723.firebasestorage.app",
            messagingSenderId: "62514210796",
            appId: "1:62514210796:web:478775e3e03726693382c9",
            measurementId: "G-0VN4N73DP1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 1. User check karo aur uska Role pata lagao
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Database se user ki details nikalo (Business hai ya Creator)
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    loadMyRequests(user.uid, role);
                }
            } else {
                window.location.href = "auth.html";
            }
        });

        async function loadMyRequests(userId, role) {
            const listContainer = document.getElementById("requests-list");
            const pageTitle = document.getElementById("page-title");
            const pageSubtitle = document.getElementById("page-subtitle");

            try {
                let q;
                if (role === 'business') {
                    pageTitle.innerText = "Sent Requests";
                    pageSubtitle.innerText = "Creators you have reached out to.";
                    // Business ke liye: Jo requests usne bheji hain
                    q = query(collection(db, "requests"), where("businessId", "==", userId));
                } else {
                    pageTitle.innerText = "Received Requests";
                    pageSubtitle.innerText = "Brands that want to collaborate with you.";
                    // Creator ke liye: Jo requests usko aayi hain
                    q = query(collection(db, "requests"), where("creatorId", "==", userId));
                }

                const querySnapshot = await getDocs(q);
                listContainer.innerHTML = ""; 

                if (querySnapshot.empty) {
                    listContainer.innerHTML = `<div class="bg-white p-10 rounded-2xl text-center border border-gray-100 shadow-sm"><h3 class="text-xl font-bold text-gray-800">No requests found!</h3></div>`;
                    return;
                }

                // Ek-ek request ko screen par dikhao
                querySnapshot.forEach(async (requestDoc) => {
                    const requestData = requestDoc.data();
                    const requestId = requestDoc.id; // Request ki unique ID
                    
                    if (role === 'business') {
                        // --- BUSINESS KA VIEW ---
                        const creatorSnap = await getDoc(doc(db, "creators", requestData.creatorId));
                        if (creatorSnap.exists()) {
                            const creator = creatorSnap.data();
                            
                            // Status ke hisaab se rang decide karo
                            let statusColor = "bg-yellow-100 text-yellow-700"; // Pending
                            if(requestData.status === "Accepted") statusColor = "bg-green-100 text-green-700";
                            if(requestData.status === "Rejected") statusColor = "bg-red-100 text-red-700";

                            listContainer.innerHTML += `
                                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between hover:shadow-md transition">
                                    <div class="flex items-center gap-4">
                                        <img src="${creator.imageUrl}" alt="${creator.name}" class="w-16 h-16 rounded-full object-cover border-2 border-gray-100">
                                        <div>
                                            <h3 class="text-lg font-extrabold text-gray-900">${creator.name}</h3>
                                            <p class="text-sm font-semibold text-gray-500">Sent to Creator</p>
                                        </div>
                                    </div>
                                    <div class="text-right flex flex-col items-end gap-2">
                                        <span class="${statusColor} px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide">
                                            ${requestData.status}
                                        </span>
                                    </div>
                                </div>
                            `;
                        }
                    } else {
                        // --- CREATOR KA VIEW ---
                        let statusColor = "bg-yellow-100 text-yellow-700";
                        if(requestData.status === "Accepted") statusColor = "bg-green-100 text-green-700";
                        if(requestData.status === "Rejected") statusColor = "bg-red-100 text-red-700";

                        // Agar status 'Pending' hai, tabhi buttons dikhao
                        let buttonsHTML = "";
                        if (requestData.status === "Pending") {
                            buttonsHTML = `
                                <div class="flex gap-2 mt-3">
                                    <button onclick="updateStatus('${requestId}', 'Accepted')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-green-700 transition">Accept</button>
                                    <button onclick="updateStatus('${requestId}', 'Rejected')" class="bg-red-100 text-red-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-200 transition">Reject</button>
                                </div>
                            `;
                        }

                        listContainer.innerHTML += `
                            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex flex-col sm:flex-row sm:items-center justify-between hover:shadow-md transition gap-4">
                                <div>
                                    <h3 class="text-lg font-extrabold text-gray-900">Collaboration Request</h3>
                                    <p class="text-sm font-semibold text-gray-500">A brand wants to work with you!</p>
                                    ${buttonsHTML}
                                </div>
                                <div class="text-left sm:text-right">
                                    <span class="${statusColor} px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide">
                                        Status: ${requestData.status}
                                    </span>
                                </div>
                            </div>
                        `;
                    }
                });

            } catch (error) {
                console.error("Error loading requests:", error);
                listContainer.innerHTML = "<p class='text-red-500 font-bold'>Error loading your requests.</p>";
            }
        }

        // 2. Status Update karne ka function (Global banaya taaki button click par chal sake)
        window.updateStatus = async function(requestId, newStatus) {
            try {
                // Database mein specific request ko update karo
                const requestRef = doc(db, "requests", requestId);
                await updateDoc(requestRef, {
                    status: newStatus
                });
                
                alert(`Request has been ${newStatus}!`);
                window.location.reload(); // Page refresh kardo taaki naya status dikhe
            } catch (error) {
                alert("Error updating status: " + error.message);
            }
        }
    </script>
</body>
</html>
