<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Profile - CreatorMatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; background-color: #f8fafc; }
        
        .blob {
            position: fixed; filter: blur(80px); z-index: -1; opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }
        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-50px) scale(1.1); }
        }
        .premium-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .text-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen relative p-4 py-12">

    <div class="blob bg-blue-300 w-96 h-96 rounded-full top-[-10%] left-[-10%]"></div>
    <div class="blob bg-purple-300 w-96 h-96 rounded-full bottom-[-10%] right-[-10%]" style="animation-delay: 3s;"></div>

    <div class="text-center mb-8 relative z-10">
        <h2 class="text-2xl font-extrabold text-gradient mb-1 tracking-tight">CreatorMatch.</h2>
        <h1 class="text-4xl font-extrabold text-gray-900">Build Your Portfolio ✨</h1>
        <p class="text-gray-500 font-semibold mt-2">Add your details and upload a photo to stand out!</p>
    </div>

    <div class="premium-card max-w-2xl w-full p-10 relative z-10">
        <form class="space-y-6" id="setup-form">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-extrabold text-gray-700 mb-2 uppercase tracking-wide">Display Name *</label>
                    <input type="text" id="c-name" required placeholder="e.g. Rahul Tech" class="w-full px-5 py-4 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition text-sm font-bold shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-extrabold text-gray-700 mb-2 uppercase tracking-wide">Niche / Category *</label>
                    <select id="c-category" class="w-full px-5 py-4 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition text-sm font-bold shadow-sm cursor-pointer">
                        <option value="Tech & Gadgets">Tech & Gadgets</option>
                        <option value="Fashion & Lifestyle">Fashion & Lifestyle</option>
                        <option value="Gaming">Gaming</option>
                        <option value="Education">Education</option>
                        <option value="Food & Travel">Food & Travel</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-extrabold text-gray-700 mb-2 uppercase tracking-wide">Total Followers *</label>
                    <input type="number" id="c-followers" required placeholder="e.g. 50000" class="w-full px-5 py-4 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition text-sm font-bold shadow-sm">
                </div>
                
                <!-- NAYA: File Upload Input -->
                <div>
                    <label class="block text-sm font-extrabold text-gray-700 mb-2 uppercase tracking-wide">Upload Profile Photo *</label>
                    <input type="file" id="c-image-file" accept="image/*" required class="w-full px-4 py-3 bg-white border border-gray-200 rounded-2xl file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100 transition shadow-sm cursor-pointer text-gray-500 font-medium">
                </div>
            </div>

            <div>
                <label class="block text-sm font-extrabold text-gray-700 mb-2 uppercase tracking-wide">About You (Bio)</label>
                <textarea id="c-bio" rows="3" placeholder="Tell brands about your content style..." class="w-full px-5 py-4 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition text-sm font-bold shadow-sm"></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-extrabold text-gray-700 mb-2 uppercase tracking-wide">Instagram Link</label>
                    <input type="url" id="c-instagram" placeholder="https://instagram.com/yourprofile" class="w-full px-5 py-4 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-pink-500/50 transition text-sm font-bold shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-extrabold text-gray-700 mb-2 uppercase tracking-wide">LinkedIn Link</label>
                    <input type="url" id="c-linkedin" placeholder="https://linkedin.com/in/yourprofile" class="w-full px-5 py-4 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition text-sm font-bold shadow-sm">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-extrabold text-gray-700 mb-2 uppercase tracking-wide">YouTube Video Link</label>
                <input type="url" id="c-video" placeholder="e.g. https://www.youtube.com/watch?v=XYZ123" class="w-full px-5 py-4 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-red-500/50 transition text-sm font-bold shadow-sm">
            </div>

            <button type="submit" id="save-btn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-extrabold rounded-2xl hover:shadow-lg hover:shadow-purple-500/30 transform hover:-translate-y-0.5 transition-all duration-300 text-lg mt-8 flex justify-center items-center gap-2">
                Save & Launch Profile
            </button>
        </form>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js"; 
        // NAYA: Storage Imports
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyACcJOwTJrBKKbE56gLtsE8U2JD2VxBIiQ", authDomain: "creatormatch-7c723.firebaseapp.com", projectId: "creatormatch-7c723", storageBucket: "creatormatch-7c723.firebasestorage.app", messagingSenderId: "62514210796", appId: "1:62514210796:web:478775e3e03726693382c9" };
        
        const app = initializeApp(firebaseConfig); 
        const auth = getAuth(app); 
        const db = getFirestore(app);
        const storage = getStorage(app); // Storage initialize kiya

        let currentUser = null;
        onAuthStateChanged(auth, (user) => {
            if (user) currentUser = user;
            else window.location.href = "auth.html";
        });

        const setupForm = document.getElementById("setup-form");
        const saveBtn = document.getElementById("save-btn");

        setupForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            saveBtn.innerHTML = `<div class="w-6 h-6 border-4 border-white border-t-transparent rounded-full animate-spin"></div> Uploading & Saving...`; 
            saveBtn.disabled = true;

            try {
                // 1. Photo nikalna input se
                const fileInput = document.getElementById("c-image-file");
                const file = fileInput.files[0];
                let finalImageUrl = "";

                if (file) {
                    // 2. Firebase Storage mein photo bhejna
                    const storageRef = ref(storage, 'profile_images/' + currentUser.uid + '_' + file.name);
                    const uploadTask = await uploadBytesResumable(storageRef, file);
                    // 3. Wahan se secure Link (URL) wapas mangwana
                    finalImageUrl = await getDownloadURL(uploadTask.ref);
                }

                // 4. Baki saara data aur NAYA Image URL Database mein save karna
                await setDoc(doc(db, "creators", currentUser.uid), {
                    name: document.getElementById("c-name").value,
                    category: document.getElementById("c-category").value,
                    followers: parseInt(document.getElementById("c-followers").value),
                    imageUrl: finalImageUrl, // Yahan direct URL jayega!
                    bio: document.getElementById("c-bio").value || "No bio provided.",
                    instagram: document.getElementById("c-instagram").value || "",
                    linkedin: document.getElementById("c-linkedin").value || "",
                    video: document.getElementById("c-video").value || "",
                    uid: currentUser.uid
                });

                alert("Profile Updated Successfully!"); 
                window.location.href = "dashboard.html";

            } catch (error) {
                alert("Error saving profile: " + error.message);
                saveBtn.innerText = "Save & Launch Profile"; 
                saveBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
